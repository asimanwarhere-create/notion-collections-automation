name: Collections Pipeline Summary

on:
  schedule:
    - cron: "7,22,37,52 * * * *"   # every 15 min, offset off the busy top-of-hour
  workflow_dispatch:          # allow manual "Run workflow" from the Actions tab

jobs:
  update-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Notion summary
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python collections_summary.py
